name: Environment Secret Test

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    environment: Tradepro_dev
    runs-on: ubuntu-latest

    steps:
      - name: Verify EC2_HOST
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "❌ EC2_HOST is empty"
            exit 1
          else
            echo "✅ EC2_HOST is available"
          fi
