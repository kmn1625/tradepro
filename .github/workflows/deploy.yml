name: Deploy to EC2 (Frontend & Backend)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

      - name: Set version tag
        id: version
        run: |
          echo "VERSION=v0.$GITHUB_RUN_NUMBER" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/neotrade-test

            echo "Using version $VERSION"

            if [ "${{ steps.changes.outputs.backend }}" = "true" ]; then
              echo "🔁 Backend changed"
              docker stop backend || true
              docker rm backend || true
              docker build -t neotrade-backend:$VERSION backend
              docker tag neotrade-backend:$VERSION neotrade-backend:latest
              docker run -d -p 5000:5000 --name backend neotrade-backend:latest
            fi

            if [ "${{ steps.changes.outputs.frontend }}" = "true" ]; then
              echo "🔁 Frontend changed"
              docker stop frontend || true
              docker rm frontend || true
              docker build -t neotrade-frontend:$VERSION frontend
              docker tag neotrade-frontend:$VERSION neotrade-frontend:latest
              docker run -d -p 8080:80 --name frontend neotrade-frontend:latest
            fi

            docker ps
